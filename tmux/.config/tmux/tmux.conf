set -g mouse on # enable mouse support to jump through windows and panes
# use xterm-256color so that italic works, which unRAID and ubuntu all support.
# unRAID doesn't support tmux-256color.
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -s set-clipboard on
set-option -g status-position top

# set prefix
unbind c-b
set -g prefix c-a
bind c-a send-prefix

# custom keybind
unbind %
bind | split-window -h -c "#{pane_current_path}" ## split tmux window vertically

unbind '"'
bind - split-window -v -c "#{pane_current_path}" ## Split tmux window horizontally 

unbind r
bind r source-file $HOME/.config/tmux/tmux.conf ## Tmux source-file

bind b last-window ## Switch to last window

# start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# resize pane
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# maximize/Minimize pane
bind -r m resize-pane -Z

# create new session
bind C-n display-popup -E 'bash -i -c "read -p \"Session name: \" name; tmux new-session -d -s \$name && tmux switch-client -t \$name"'

# select sessions with fzf
bind C-s display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"

# lazygit
bind C-g display-popup \
  -d '#{pane_current_path}' \
  -w 90% \
  -h 90% \
  -E 'lazygit'

# ====================
# TPM
# prefix + I: Installs new plugins from GitHub or any other git repository && Refreshes TMUX environment
# prefix + U: update plugin(s) 
# prefix + alt + u: remove/uninstall plugins not on the plugin list
# ====================

# set plugin install path
set-environment -gF TMUX_PLUGIN_MANAGER_PATH '#{HOME}/.local/share/tmux/plugins'

# auto install plugins when start tmux
if "test ! -d $HOME/.local/share/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm $HOME/.local/share/tmux/plugins/tpm && $HOME/.local/share/tmux/plugins/tpm/bin/install_plugins'"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'omerxx/tmux-floax'

# tmux-floax
set -g @floax-width '90%'
set -g @floax-height '90%'

# tmux-yank
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# theming
# set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato or mocha
set -g @catppuccin_status_background none

set -g @catppuccin_window_status_style "custom" # basic, rounded, slanted, custom, or none
set -g @catppuccin_window_current_middle_separator "#[bg=default,fg=#{@thm_yellow}]█"
set -g @catppuccin_window_current_right_separator "#[bg=default,fg=#{@thm_yellow}]▓▒░"
set -g @catppuccin_window_current_number "#[bg=default,fg=#{@thm_yellow}]░▒▓█#[bg=#{@thm_yellow},fg=#{@thm_mantle},bold]#I"
set -g @catppuccin_window_current_text "#[bg=#{@thm_yellow},fg=#{@thm_mantle},bold]#{b:pane_current_path} " # Don't display the full path, but just the last segment, https://jonathanmh.com/p/tmux-show-current-directory-in-window-status/

set -g @catppuccin_window_middle_separator ""
set -g @catppuccin_window_right_separator "#[bg=default,fg=#{@thm_surface_1}]█▓▒░"
set -g @catppuccin_window_text ""
set -g @catppuccin_window_number "#[bg=default,fg=#{@thm_surface_1}]░▒▓█#[bg=#{@thm_surface_1},fg=default]#I"

set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_module_bg_color default

set -g status-right-length 100
set -g status-left-length 100
set -g status-justify centre

set -g status-left ""
set -ag status-left "#[bg=#{@thm_yellow}]#{E:@catppuccin_status_session}"
set -g @catppuccin_session_icon ""
set -g @catppuccin_session_text "#[fg=#{?client_prefix,#{E:@thm_red},#{E:@thm_lavender}},bold]░▒▓█#[reverse]#S#[noreverse]█▓▒░"

set -g status-right ""
set -ag status-right "#{E:@catppuccin_status_host}"
set -g @catppuccin_host_icon ""
set -g @catppuccin_host_text "#[fg=#{?client_prefix,#{E:@thm_red},#{E:@thm_lavender}},bold]░▒▓█#[reverse]#H#[noreverse]█▓▒░"

run ~/.local/share/tmux/plugins/tmux/catppuccin.tmux

# initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '$HOME/.local/share/tmux/plugins/tpm/tpm'
